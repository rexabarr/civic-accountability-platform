[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build && npx prisma generate && npx prisma migrate deploy && node dist/scripts/seed.js"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
